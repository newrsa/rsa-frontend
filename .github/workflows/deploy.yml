name: Auto Deploy to MilesWeb

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js Static Site
        run: npm run build

      - name: Check Build Output
        run: |
          echo "=== Build Output Directory ==="
          ls -la out/
          echo ""
          echo "=== Next.js Chunks Generated ==="
          find out/_next/static/chunks -type f -name "*.js" 2>/dev/null | head -10
          echo ""
          echo "=== First chunk file content (first line) ==="
          find out/_next/static/chunks -type f -name "*.js" 2>/dev/null | head -1 | xargs head -c 200

      - name: Deploy to FTP (Binary Mode)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /
          protocol: ftps
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.DS_Store
            **/node_modules/**